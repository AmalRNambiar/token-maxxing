name: release

# Push a version tag (e.g. v0.1.0) to build installers for every OS
# and publish them to a GitHub Release.
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04   # Linux: .deb, .rpm, .AppImage
          - platform: macos-latest   # macOS: .dmg, .app
          - platform: windows-latest # Windows: .msi, -setup.exe

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential \
            curl wget file libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev librpm-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "token-maxxing ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
